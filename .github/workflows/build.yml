name: Build Liblouis
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com)
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config libyaml-dev
      
      - name: Build
        run: |
          ./autogen.sh
          ./configure
          make
          
      - name: Upload Artifact
        uses: [actions/upload-artifact@v4](https://github.com)
        with:
          name: liblouis-shared-library
          path: |
            lib/.libs/liblouis.so*
